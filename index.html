<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品集</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0D1117;
  --card: #161B22;
  --card-hover: #1F2937;
  --gold: #D4A853;
  --gold-light: #E8C27A;
  --cream: #F5F0E8;
  --muted: #8B8378;
  --border: rgba(212,168,83,0.18);
  --r: 10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--cream);display:flex;flex-direction:column;}

/* ── NAV ── */
nav{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:56px;
  background:rgba(13,17,23,0.95);
  border-bottom:1px solid var(--border);
  position:relative;z-index:50;
}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);letter-spacing:0.04em;}
.admin-hint{font-size:0.72rem;color:var(--muted);letter-spacing:0.06em;}
.nav-right{display:flex;align-items:center;gap:0.75rem;}
#admin-toggle{
  background:transparent;border:1px solid rgba(255,255,255,0.12);
  color:var(--muted);padding:0.3rem 0.9rem;border-radius:6px;
  font-size:0.75rem;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all 0.2s;letter-spacing:0.04em;
}
#admin-toggle:hover{border-color:var(--gold);color:var(--gold);}
#admin-toggle.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,83,0.08);}
#edit-profile-btn{
  display:none;background:transparent;border:1px solid var(--gold);
  color:var(--gold);padding:0.3rem 0.9rem;border-radius:6px;
  font-size:0.75rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;
}
#edit-profile-btn:hover{background:var(--gold);color:var(--navy);}

/* ── MAIN LAYOUT ── */
.main{flex:1;display:grid;grid-template-columns:280px 1fr;overflow:hidden;}

/* ── LEFT PANEL ── */
.left{
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.profile-area{
  padding:1.5rem 1.25rem 1.25rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.avatar{
  width:52px;height:52px;border-radius:50%;
  background:rgba(212,168,83,0.15);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;margin-bottom:0.85rem;
}
.profile-name{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:0.2rem;}
.profile-title{font-size:0.75rem;color:var(--gold);letter-spacing:0.06em;margin-bottom:0.75rem;}
.profile-bio{font-size:0.78rem;color:var(--muted);line-height:1.65;margin-bottom:0.9rem;}
.meta-row{display:flex;align-items:center;gap:0.45rem;font-size:0.73rem;color:var(--muted);margin-bottom:0.35rem;}
.meta-row svg{flex-shrink:0;opacity:0.6;}
.skills-wrap{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.85rem;}
.skill-tag{background:rgba(212,168,83,0.1);border:1px solid rgba(212,168,83,0.22);color:var(--gold-light);padding:0.2rem 0.6rem;border-radius:14px;font-size:0.68rem;}

/* ── CATEGORY LIST ── */
.cat-section{flex:1;overflow-y:auto;padding:1rem 0;}
.cat-section-label{font-size:0.65rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;padding:0 1.25rem 0.6rem;}
.cat-item{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.6rem 1.25rem;cursor:pointer;
  transition:background 0.15s;position:relative;
}
.cat-item:hover{background:rgba(255,255,255,0.04);}
.cat-item.active{background:rgba(212,168,83,0.08);}
.cat-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--gold);border-radius:0 2px 2px 0;}
.cat-emoji{font-size:1.1rem;flex-shrink:0;}
.cat-info{flex:1;min-width:0;}
.cat-name-text{font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-count-text{font-size:0.68rem;color:var(--muted);}
.cat-actions{display:none;gap:0.3rem;flex-shrink:0;}
.cat-item:hover .cat-actions{display:flex;}
.icon-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;transition:all 0.15s;padding:0;
}
.icon-btn:hover{background:rgba(255,255,255,0.08);color:var(--cream);}
.icon-btn.danger:hover{background:rgba(224,90,90,0.12);color:#e05a5a;}
.add-cat-btn{
  display:flex;align-items:center;gap:0.6rem;
  padding:0.6rem 1.25rem;cursor:pointer;color:var(--muted);
  font-size:0.82rem;transition:color 0.15s;background:none;border:none;
  width:100%;text-align:left;font-family:'Inter',sans-serif;
}
.add-cat-btn:hover{color:var(--gold);}

/* ── RIGHT PANEL ── */
.right{display:flex;flex-direction:column;overflow:hidden;}

/* ── WORKS GRID VIEW ── */
.works-view{flex:1;overflow-y:auto;padding:1.5rem;}
.works-view-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.view-cat-title{font-family:'Playfair Display',serif;font-size:1.5rem;}
.view-cat-desc{font-size:0.78rem;color:var(--muted);margin-top:0.2rem;}
.add-work-btn{
  display:none;background:transparent;border:1px solid var(--gold);
  color:var(--gold);padding:0.35rem 0.9rem;border-radius:6px;
  font-size:0.75rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;
  white-space:nowrap;
}
.add-work-btn:hover{background:var(--gold);color:var(--navy);}
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}
.work-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;cursor:pointer;
  transition:all 0.2s;position:relative;
}
.work-card:hover{border-color:rgba(212,168,83,0.4);transform:translateY(-2px);}
.work-thumb{
  aspect-ratio:16/9;background:#000;
  display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;
}
.work-thumb video,.work-thumb img{width:100%;height:100%;object-fit:cover;}
.thumb-placeholder{color:var(--muted);opacity:0.3;font-size:1.5rem;}
.play-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.18s;
}
.work-card:hover .play-overlay{opacity:1;}
.play-btn-circle{width:40px;height:40px;border-radius:50%;background:rgba(212,168,83,0.9);display:flex;align-items:center;justify-content:center;}
.work-info{padding:0.75rem 0.9rem;}
.work-card-title{font-size:0.85rem;font-weight:500;margin-bottom:0.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.work-card-year{font-size:0.68rem;color:var(--muted);}
.work-card-edit{
  position:absolute;top:6px;right:6px;
  background:rgba(13,17,23,0.8);border:1px solid var(--border);
  border-radius:5px;padding:0.2rem 0.4rem;font-size:0.65rem;
  color:var(--muted);cursor:pointer;display:none;transition:all 0.15s;
}
.work-card:hover .work-card-edit{display:block;}
.work-card-edit:hover{color:var(--gold);}

.empty-works{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:200px;color:var(--muted);gap:0.6rem;
}
.empty-works svg{opacity:0.2;}
.empty-works p{font-size:0.82rem;}

/* ── WORK PLAYER VIEW ── */
.player-view{
  flex:1;display:none;flex-direction:column;overflow:hidden;
}
.player-topbar{
  flex-shrink:0;display:flex;align-items:center;gap:1rem;
  padding:0.75rem 1.5rem;border-bottom:1px solid var(--border);
}
.btn-back{
  background:none;border:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;gap:0.4rem;font-size:0.82rem;
  font-family:'Inter',sans-serif;transition:color 0.15s;
}
.btn-back:hover{color:var(--gold);}
.player-work-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);}
.player-body{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden;}
.player-media{background:#000;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.player-media video,.player-media img{max-width:100%;max-height:100%;object-fit:contain;}
.player-media video{pointer-events:auto;}
.no-dl-overlay{position:absolute;inset:0;z-index:5;}
.player-sidebar{
  border-left:1px solid var(--border);
  padding:1.25rem;overflow-y:auto;display:flex;flex-direction:column;gap:1rem;
}
.sidebar-label{font-size:0.65rem;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-bottom:0.4rem;}
.sidebar-value{font-size:0.85rem;line-height:1.7;color:var(--cream);white-space:pre-line;}
.sidebar-meta{font-size:0.78rem;color:var(--muted);}
.sidebar-block{display:flex;flex-direction:column;}

/* ── MODALS ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity 0.18s;backdrop-filter:blur(6px);
}
.overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:1.75rem;width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;
  transform:translateY(10px);transition:transform 0.2s;
}
.overlay.open .modal{transform:translateY(0);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:background 0.15s;}
.close-btn:hover{background:rgba(255,255,255,0.06);color:var(--cream);}
.fg{margin-bottom:1.1rem;}
.fl{display:block;font-size:0.72rem;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:0.4rem;}
.fi,.ft,.fs{
  width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  color:var(--cream);border-radius:7px;padding:0.55rem 0.8rem;
  font-family:'Inter',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.15s;
}
.fi:focus,.ft:focus,.fs:focus{border-color:var(--gold);}
.ft{min-height:100px;resize:vertical;line-height:1.6;}
.fs option{background:#1a2030;}
.modal-footer{display:flex;gap:0.6rem;justify-content:flex-end;margin-top:1.25rem;}
.btn-p{background:var(--gold);color:var(--navy);border:none;padding:0.5rem 1.25rem;border-radius:7px;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.btn-p:hover{background:var(--gold-light);}
.btn-g{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.1);padding:0.5rem 1rem;border-radius:7px;font-size:0.82rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.btn-g:hover{border-color:rgba(255,255,255,0.25);color:var(--cream);}
.btn-d{background:transparent;color:#e05a5a;border:1px solid rgba(224,90,90,0.25);padding:0.5rem 1rem;border-radius:7px;font-size:0.82rem;cursor:pointer;font-family:'Inter',sans-serif;margin-right:auto;transition:all 0.2s;}
.btn-d:hover{background:rgba(224,90,90,0.1);}

.upload-area{
  border:2px dashed rgba(212,168,83,0.22);border-radius:8px;
  padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;
}
.upload-area:hover{border-color:var(--gold);background:rgba(212,168,83,0.04);}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:1.6rem;opacity:0.4;margin-bottom:0.4rem;}
.upload-text{font-size:0.78rem;color:var(--muted);}
.upload-hint{font-size:0.68rem;color:rgba(139,131,120,0.5);margin-top:0.2rem;}
.upload-preview{font-size:0.75rem;color:var(--gold);margin-top:0.5rem;}

.skills-tags{display:flex;flex-wrap:wrap;gap:0.35rem;margin-bottom:0.5rem;}
.skill-edit-tag{display:flex;align-items:center;gap:0.3rem;background:rgba(212,168,83,0.1);border:1px solid rgba(212,168,83,0.22);color:var(--gold-light);padding:0.18rem 0.55rem;border-radius:12px;font-size:0.72rem;}
.rm-btn{background:none;border:none;color:inherit;cursor:pointer;opacity:0.6;font-size:0.8rem;padding:0;line-height:1;}
.rm-btn:hover{opacity:1;}
.skill-add-row{display:flex;gap:0.5rem;}
.skill-add-row .fi{flex:1;}
.skill-add-btn{background:rgba(212,168,83,0.12);border:1px solid rgba(212,168,83,0.25);color:var(--gold);border-radius:7px;padding:0.45rem 0.8rem;cursor:pointer;font-size:0.78rem;white-space:nowrap;transition:all 0.2s;font-family:'Inter',sans-serif;}
.skill-add-btn:hover{background:rgba(212,168,83,0.22);}

/* ── PASSWORD MODAL ── */
.pwd-modal{max-width:320px;}
.pwd-modal input{text-align:center;letter-spacing:0.2em;font-size:1rem;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(212,168,83,0.18);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(212,168,83,0.35);}

/* prevent download */
video{-webkit-user-select:none;user-select:none;}
img{-webkit-user-drag:none;user-drag:none;}

/* ── WELCOME / EMPTY STATE ── */
.welcome-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--muted);gap:0.75rem;padding:2rem;text-align:center;
}
.welcome-state .w-icon{font-size:3rem;opacity:0.25;}
.welcome-state h2{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--cream);opacity:0.4;}
.welcome-state p{font-size:0.8rem;opacity:0.5;max-width:240px;line-height:1.7;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">🎬 作品集</div>
  <div class="nav-right">
    <span class="admin-hint" id="admin-label" style="display:none;">管理员模式</span>
    <button id="admin-toggle" onclick="toggleAdmin()">管理员登录</button>
    <button id="edit-profile-btn" onclick="openProfileModal()">✏ 编辑资料</button>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: 个人信息 + 分类 -->
  <div class="left">
    <div class="profile-area">
      <div class="avatar" id="disp-avatar">🎨</div>
      <div class="profile-name" id="disp-name">陈小艺</div>
      <div class="profile-title" id="disp-title">二维动画 · AI动画 · 视频剪辑</div>
      <div class="profile-bio" id="disp-bio">专注于二维动画创作与AI辅助动画制作，热爱用视觉语言讲述故事，擅长将传统美学与现代技术融合。</div>
      <div class="meta-row">
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.948V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 8V5z"/></svg>
        <span id="disp-phone">138-0000-0000</span>
      </div>
      <div class="meta-row">
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <span id="disp-email">hello@example.com</span>
      </div>
      <div class="meta-row">
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span id="disp-location">上海 · 中国</span>
      </div>
      <div class="skills-wrap" id="disp-skills"></div>
    </div>

    <div class="cat-section">
      <div class="cat-section-label">作品分类</div>
      <div id="cat-list"></div>
      <button class="add-cat-btn admin-only" id="add-cat-btn" style="display:none;" onclick="openAddCatModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        添加分类
      </button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right" id="right-panel">

    <!-- 欢迎页 -->
    <div class="welcome-state" id="welcome-view">
      <div class="w-icon">🎬</div>
      <h2>欢迎来到作品集</h2>
      <p>从左侧选择分类，浏览作品</p>
    </div>

    <!-- 作品网格 -->
    <div class="works-view" id="works-view" style="display:none;">
      <div class="works-view-header">
        <div>
          <div class="view-cat-title" id="view-cat-title"></div>
          <div class="view-cat-desc" id="view-cat-desc"></div>
        </div>
        <button class="add-work-btn admin-only" id="add-work-btn" onclick="openAddWorkModal()">+ 上传作品</button>
      </div>
      <div class="works-grid" id="works-grid"></div>
    </div>

    <!-- 播放器 -->
    <div class="player-view" id="player-view">
      <div class="player-topbar">
        <button class="btn-back" onclick="closePlayer()">← 返回</button>
        <div class="player-work-title" id="pw-title"></div>
      </div>
      <div class="player-body">
        <div class="player-media" id="player-media">
          <div class="no-dl-overlay" id="no-dl-overlay" oncontextmenu="return false;"></div>
        </div>
        <div class="player-sidebar">
          <div class="sidebar-block">
            <div class="sidebar-label">作品描述</div>
            <div class="sidebar-value" id="pw-desc">暂无描述</div>
          </div>
          <div class="sidebar-block">
            <div class="sidebar-label">分类</div>
            <div class="sidebar-meta" id="pw-cat"></div>
          </div>
          <div class="sidebar-block">
            <div class="sidebar-label">年份</div>
            <div class="sidebar-meta" id="pw-year"></div>
          </div>
          <div class="sidebar-block">
            <div class="sidebar-label">时长</div>
            <div class="sidebar-meta" id="pw-dur"></div>
          </div>
          <div class="sidebar-block">
            <div class="sidebar-label">格式</div>
            <div class="sidebar-meta" id="pw-fmt"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ══ MODALS ══ -->

<!-- 密码 -->
<div class="overlay" id="overlay-pwd">
  <div class="modal pwd-modal">
    <div class="modal-head">
      <div class="modal-title">管理员验证</div>
      <button class="close-btn" onclick="closeOverlay('overlay-pwd')">✕</button>
    </div>
    <div class="fg">
      <label class="fl">请输入管理员密码</label>
      <input class="fi" type="password" id="pwd-input" placeholder="••••••" onkeydown="if(e&&e.key==='Enter')verifyPwd()">
    </div>
    <div id="pwd-err" style="font-size:0.75rem;color:#e05a5a;min-height:1rem;margin-bottom:0.5rem;"></div>
    <div class="modal-footer">
      <button class="btn-g" onclick="closeOverlay('overlay-pwd')">取消</button>
      <button class="btn-p" onclick="verifyPwd()">登录</button>
    </div>
  </div>
</div>

<!-- 个人资料 -->
<div class="overlay" id="overlay-profile">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">编辑个人资料</div>
      <button class="close-btn" onclick="closeOverlay('overlay-profile')">✕</button>
    </div>
    <div class="fg"><label class="fl">头像 Emoji</label><input class="fi" id="e-avatar" placeholder="🎨" maxlength="4"></div>
    <div class="fg"><label class="fl">姓名</label><input class="fi" id="e-name"></div>
    <div class="fg"><label class="fl">职业头衔</label><input class="fi" id="e-title"></div>
    <div class="fg"><label class="fl">个人简介</label><textarea class="ft" id="e-bio"></textarea></div>
    <div class="fg"><label class="fl">电话</label><input class="fi" id="e-phone"></div>
    <div class="fg"><label class="fl">邮箱</label><input class="fi" id="e-email"></div>
    <div class="fg"><label class="fl">城市 / 地区</label><input class="fi" id="e-location"></div>
    <div class="fg">
      <label class="fl">技能标签</label>
      <div class="skills-tags" id="skills-edit-area"></div>
      <div class="skill-add-row">
        <input class="fi" id="skill-inp" placeholder="输入技能，按回车添加">
        <button class="skill-add-btn" onclick="addSkill()">添加</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-g" onclick="closeOverlay('overlay-profile')">取消</button>
      <button class="btn-p" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<!-- 分类 -->
<div class="overlay" id="overlay-cat">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="cat-modal-title">添加分类</div>
      <button class="close-btn" onclick="closeOverlay('overlay-cat')">✕</button>
    </div>
    <div class="fg"><label class="fl">分类名称</label><input class="fi" id="cat-inp-name"></div>
    <div class="fg"><label class="fl">图标 Emoji</label><input class="fi" id="cat-inp-emoji" maxlength="4"></div>
    <div class="fg"><label class="fl">分类描述</label><textarea class="ft" id="cat-inp-desc" style="min-height:70px;"></textarea></div>
    <div class="modal-footer">
      <button class="btn-g" onclick="closeOverlay('overlay-cat')">取消</button>
      <button class="btn-p" id="cat-save-btn" onclick="saveCat()">保存</button>
    </div>
  </div>
</div>

<!-- 作品 -->
<div class="overlay" id="overlay-work">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="work-modal-title">上传作品</div>
      <button class="close-btn" onclick="closeOverlay('overlay-work')">✕</button>
    </div>
    <div class="fg"><label class="fl">作品名称</label><input class="fi" id="w-inp-name"></div>
    <div class="fg">
      <label class="fl">上传文件（视频 / 图片 / GIF）</label>
      <div class="upload-area">
        <input type="file" id="w-file" accept="video/*,image/*,.gif" onchange="onFileChange(this)">
        <div class="upload-icon">⬆</div>
        <div class="upload-text">点击或拖拽上传</div>
        <div class="upload-hint">支持 MP4 · MOV · WebM · JPG · PNG · GIF</div>
        <div class="upload-preview" id="w-file-preview"></div>
      </div>
    </div>
    <div class="fg"><label class="fl">作品描述</label><textarea class="ft" id="w-inp-desc"></textarea></div>
    <div class="fg"><label class="fl">年份</label><input class="fi" id="w-inp-year" maxlength="4"></div>
    <div class="fg"><label class="fl">时长（选填）</label><input class="fi" id="w-inp-dur" placeholder="如：2分30秒"></div>
    <div class="modal-footer">
      <button class="btn-d" id="w-del-btn" style="display:none;" onclick="deleteWork()">删除作品</button>
      <button class="btn-g" onclick="closeOverlay('overlay-work')">取消</button>
      <button class="btn-p" id="w-save-btn" onclick="saveWork()">保存</button>
    </div>
  </div>
</div>

<script>
// ══ DATA ══
const ADMIN_PASSWORD = '1234'; // ← 在这里修改密码

let isAdmin = false;
let tempSkills = [];
let pendingFile = null;
let editingCatId = null;
let editingWorkId = null;
let currentCatId = null;
let currentWorkId = null;

let profile = {
  avatar: '🎨',
  name: '陈小艺',
  title: '二维动画 · AI动画 · 视频剪辑',
  bio: '专注于二维动画创作与AI辅助动画制作，热爱用视觉语言讲述故事，擅长将传统美学与现代技术融合。',
  phone: '138-0000-0000',
  email: 'hello@example.com',
  location: '上海 · 中国',
  skills: ['Adobe Animate', 'After Effects', 'Runway ML', 'Premiere Pro', 'Stable Diffusion', 'DaVinci Resolve']
};

let categories = [
  { id: 'c1', name: '二维动画', emoji: '🎨', desc: '手绘逐帧动画，传统美学与现代叙事' },
  { id: 'c2', name: 'AI 动画', emoji: '🤖', desc: '人工智能辅助生成的创意动态影像' },
  { id: 'c3', name: '视频剪辑', emoji: '✂️', desc: '商业宣传、MV、短视频剪辑项目' },
];

let works = {}; // catId -> [{id,name,desc,year,dur,fileURL,fileType,fileName}]

// ══ ADMIN ══
function toggleAdmin() {
  if (isAdmin) { logoutAdmin(); return; }
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-err').textContent = '';
  openOverlay('overlay-pwd');
  setTimeout(() => document.getElementById('pwd-input').focus(), 100);
}
function verifyPwd() {
  const v = document.getElementById('pwd-input').value;
  if (v === ADMIN_PASSWORD) {
    isAdmin = true;
    closeOverlay('overlay-pwd');
    updateAdminUI();
  } else {
    document.getElementById('pwd-err').textContent = '密码错误，请重试';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') verifyPwd(); });
function logoutAdmin() {
  isAdmin = false;
  updateAdminUI();
}
function updateAdminUI() {
  const toggle = document.getElementById('admin-toggle');
  const label = document.getElementById('admin-label');
  const editBtn = document.getElementById('edit-profile-btn');
  const addCatBtn = document.getElementById('add-cat-btn');
  const addWorkBtn = document.getElementById('add-work-btn');
  if (isAdmin) {
    toggle.textContent = '退出管理';
    toggle.classList.add('active');
    label.style.display = 'block';
    editBtn.style.display = 'inline-block';
    addCatBtn.style.display = 'flex';
    addWorkBtn.style.display = 'inline-block';
  } else {
    toggle.textContent = '管理员登录';
    toggle.classList.remove('active');
    label.style.display = 'none';
    editBtn.style.display = 'none';
    addCatBtn.style.display = 'none';
    addWorkBtn.style.display = 'none';
  }
  renderCats();
  if (currentCatId) renderWorksGrid(currentCatId);
}

// ══ OVERLAYS ══
function openOverlay(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ══ PROFILE ══
function renderProfile() {
  document.getElementById('disp-avatar').textContent = profile.avatar;
  document.getElementById('disp-name').textContent = profile.name;
  document.getElementById('disp-title').textContent = profile.title;
  document.getElementById('disp-bio').textContent = profile.bio;
  document.getElementById('disp-phone').textContent = profile.phone;
  document.getElementById('disp-email').textContent = profile.email;
  document.getElementById('disp-location').textContent = profile.location;
  document.getElementById('disp-skills').innerHTML = profile.skills.map(s => `<span class="skill-tag">${s}</span>`).join('');
}
function openProfileModal() {
  document.getElementById('e-avatar').value = profile.avatar;
  document.getElementById('e-name').value = profile.name;
  document.getElementById('e-title').value = profile.title;
  document.getElementById('e-bio').value = profile.bio;
  document.getElementById('e-phone').value = profile.phone;
  document.getElementById('e-email').value = profile.email;
  document.getElementById('e-location').value = profile.location;
  tempSkills = [...profile.skills];
  renderSkillsEdit();
  openOverlay('overlay-profile');
}
function renderSkillsEdit() {
  document.getElementById('skills-edit-area').innerHTML = tempSkills.map((s,i) =>
    `<div class="skill-edit-tag">${s}<button class="rm-btn" onclick="rmSkill(${i})">×</button></div>`
  ).join('');
}
function rmSkill(i) { tempSkills.splice(i,1); renderSkillsEdit(); }
function addSkill() {
  const inp = document.getElementById('skill-inp');
  const v = inp.value.trim();
  if (v && !tempSkills.includes(v)) { tempSkills.push(v); renderSkillsEdit(); }
  inp.value = '';
}
document.getElementById('skill-inp').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addSkill(); } });
function saveProfile() {
  profile.avatar = document.getElementById('e-avatar').value.trim() || profile.avatar;
  profile.name = document.getElementById('e-name').value.trim() || profile.name;
  profile.title = document.getElementById('e-title').value.trim() || profile.title;
  profile.bio = document.getElementById('e-bio').value.trim() || profile.bio;
  profile.phone = document.getElementById('e-phone').value.trim() || profile.phone;
  profile.email = document.getElementById('e-email').value.trim() || profile.email;
  profile.location = document.getElementById('e-location').value.trim() || profile.location;
  profile.skills = [...tempSkills];
  renderProfile();
  closeOverlay('overlay-profile');
}

// ══ CATEGORIES ══
function renderCats() {
  const list = document.getElementById('cat-list');
  list.innerHTML = categories.map(c => {
    const count = (works[c.id] || []).length;
    const adminBtns = isAdmin ? `<div class="cat-actions">
      <button class="icon-btn" onclick="event.stopPropagation();openEditCatModal('${c.id}')" title="编辑">✏</button>
      <button class="icon-btn danger" onclick="event.stopPropagation();deleteCat('${c.id}')" title="删除">🗑</button>
    </div>` : '';
    return `<div class="cat-item${currentCatId===c.id?' active':''}" onclick="selectCat('${c.id}')">
      <div class="cat-emoji">${c.emoji}</div>
      <div class="cat-info">
        <div class="cat-name-text">${c.name}</div>
        <div class="cat-count-text">${count} 件作品</div>
      </div>
      ${adminBtns}
    </div>`;
  }).join('');
}
function selectCat(catId) {
  currentCatId = catId;
  closePlayer();
  document.getElementById('welcome-view').style.display = 'none';
  document.getElementById('works-view').style.display = 'flex';
  document.getElementById('works-view').style.flexDirection = 'column';
  const cat = categories.find(c => c.id === catId);
  document.getElementById('view-cat-title').textContent = (cat.emoji + ' ' + cat.name);
  document.getElementById('view-cat-desc').textContent = cat.desc;
  if (isAdmin) document.getElementById('add-work-btn').style.display = 'inline-block';
  renderWorksGrid(catId);
  renderCats();
}
function openAddCatModal() {
  editingCatId = null;
  document.getElementById('cat-modal-title').textContent = '添加分类';
  document.getElementById('cat-save-btn').textContent = '添加';
  document.getElementById('cat-inp-name').value = '';
  document.getElementById('cat-inp-emoji').value = '';
  document.getElementById('cat-inp-desc').value = '';
  openOverlay('overlay-cat');
}
function openEditCatModal(catId) {
  editingCatId = catId;
  const c = categories.find(x => x.id === catId);
  document.getElementById('cat-modal-title').textContent = '编辑分类';
  document.getElementById('cat-save-btn').textContent = '保存';
  document.getElementById('cat-inp-name').value = c.name;
  document.getElementById('cat-inp-emoji').value = c.emoji;
  document.getElementById('cat-inp-desc').value = c.desc;
  openOverlay('overlay-cat');
}
function saveCat() {
  const name = document.getElementById('cat-inp-name').value.trim();
  const emoji = document.getElementById('cat-inp-emoji').value.trim() || '🎬';
  const desc = document.getElementById('cat-inp-desc').value.trim();
  if (!name) return;
  if (editingCatId) {
    const c = categories.find(x => x.id === editingCatId);
    if (c) { c.name = name; c.emoji = emoji; c.desc = desc; }
    if (currentCatId === editingCatId) {
      document.getElementById('view-cat-title').textContent = emoji + ' ' + name;
      document.getElementById('view-cat-desc').textContent = desc;
    }
  } else {
    categories.push({ id: 'c_' + Date.now(), name, emoji, desc });
  }
  renderCats();
  closeOverlay('overlay-cat');
}
function deleteCat(catId) {
  if (!confirm('确定删除这个分类及其所有作品吗？')) return;
  categories = categories.filter(c => c.id !== catId);
  delete works[catId];
  if (currentCatId === catId) {
    currentCatId = null;
    document.getElementById('works-view').style.display = 'none';
    document.getElementById('welcome-view').style.display = 'flex';
    closePlayer();
  }
  renderCats();
}

// ══ WORKS GRID ══
function renderWorksGrid(catId) {
  const list = works[catId] || [];
  const grid = document.getElementById('works-grid');
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-works" style="grid-column:1/-1;">
      <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.361a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
      <p>${isAdmin ? '点击右上角上传第一件作品' : '暂无作品'}</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(w => {
    let thumb = `<div class="thumb-placeholder">🎬</div>`;
    if (w.fileURL) {
      if (w.fileType === 'video') thumb = `<video src="${w.fileURL}" muted playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover;"></video>`;
      else if (w.fileType === 'image') thumb = `<img src="${w.fileURL}" alt="${w.name}" style="width:100%;height:100%;object-fit:cover;" draggable="false" oncontextmenu="return false;">`;
    }
    const editBtn = isAdmin ? `<div class="work-card-edit" onclick="event.stopPropagation();openEditWorkModal('${w.id}')">✏ 编辑</div>` : '';
    return `<div class="work-card" onclick="openWork('${catId}','${w.id}')">
      <div class="work-thumb">${thumb}
        <div class="play-overlay"><div class="play-btn-circle">
          <svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div></div>
      </div>
      <div class="work-info">
        <div class="work-card-title">${w.name}</div>
        <div class="work-card-year">${w.year || ''}</div>
      </div>
      ${editBtn}
    </div>`;
  }).join('');
}

// ══ WORKS CRUD ══
function openAddWorkModal() {
  editingWorkId = null;
  pendingFile = null;
  document.getElementById('work-modal-title').textContent = '上传作品';
  document.getElementById('w-save-btn').textContent = '保存';
  document.getElementById('w-del-btn').style.display = 'none';
  document.getElementById('w-inp-name').value = '';
  document.getElementById('w-inp-desc').value = '';
  document.getElementById('w-inp-year').value = new Date().getFullYear();
  document.getElementById('w-inp-dur').value = '';
  document.getElementById('w-file-preview').textContent = '';
  document.getElementById('w-file').value = '';
  openOverlay('overlay-work');
}
function openEditWorkModal(wId) {
  const w = (works[currentCatId] || []).find(x => x.id === wId);
  if (!w) return;
  editingWorkId = wId;
  pendingFile = null;
  document.getElementById('work-modal-title').textContent = '编辑作品';
  document.getElementById('w-save-btn').textContent = '保存';
  document.getElementById('w-del-btn').style.display = 'inline-block';
  document.getElementById('w-inp-name').value = w.name;
  document.getElementById('w-inp-desc').value = w.desc || '';
  document.getElementById('w-inp-year').value = w.year || '';
  document.getElementById('w-inp-dur').value = w.dur || '';
  document.getElementById('w-file-preview').textContent = w.fileName ? '当前：' + w.fileName : '';
  document.getElementById('w-file').value = '';
  openOverlay('overlay-work');
}
function onFileChange(input) {
  const f = input.files[0];
  if (!f) return;
  pendingFile = f;
  document.getElementById('w-file-preview').textContent = '已选：' + f.name;
}
function saveWork() {
  const name = document.getElementById('w-inp-name').value.trim();
  if (!name) return;
  const desc = document.getElementById('w-inp-desc').value.trim();
  const year = document.getElementById('w-inp-year').value.trim();
  const dur = document.getElementById('w-inp-dur').value.trim();

  const commit = (fileURL, fileType, fileName) => {
    if (!works[currentCatId]) works[currentCatId] = [];
    if (editingWorkId) {
      const w = works[currentCatId].find(x => x.id === editingWorkId);
      if (w) { w.name=name; w.desc=desc; w.year=year; w.dur=dur; if(fileURL){w.fileURL=fileURL;w.fileType=fileType;w.fileName=fileName;} }
    } else {
      works[currentCatId].push({ id:'w_'+Date.now(), name, desc, year, dur, fileURL:fileURL||'', fileType:fileType||'', fileName:fileName||'' });
    }
    renderWorksGrid(currentCatId);
    renderCats();
    closeOverlay('overlay-work');
  };

  if (pendingFile) {
    const reader = new FileReader();
    reader.onload = e => {
      const ft = pendingFile.type.startsWith('video') ? 'video' : 'image';
      commit(e.target.result, ft, pendingFile.name);
    };
    reader.readAsDataURL(pendingFile);
  } else { commit(null,null,null); }
}
function deleteWork() {
  if (!confirm('确定删除这件作品吗？')) return;
  works[currentCatId] = (works[currentCatId]||[]).filter(w => w.id !== editingWorkId);
  if (currentWorkId === editingWorkId) closePlayer();
  renderWorksGrid(currentCatId);
  renderCats();
  closeOverlay('overlay-work');
}

// ══ PLAYER ══
function openWork(catId, wId) {
  const w = (works[catId]||[]).find(x => x.id === wId);
  if (!w) return;
  currentCatId = catId;
  currentWorkId = wId;
  const cat = categories.find(c => c.id === catId);

  document.getElementById('pw-title').textContent = w.name;
  document.getElementById('pw-desc').textContent = w.desc || '暂无描述';
  document.getElementById('pw-cat').textContent = cat ? (cat.emoji + ' ' + cat.name) : '';
  document.getElementById('pw-year').textContent = w.year || '—';
  document.getElementById('pw-dur').textContent = w.dur || '—';
  document.getElementById('pw-fmt').textContent = w.fileName ? w.fileName.split('.').pop().toUpperCase() : '—';

  const media = document.getElementById('player-media');
  const overlay = document.getElementById('no-dl-overlay');
  // remove old media (keep overlay)
  Array.from(media.children).forEach(el => { if (el !== overlay) el.remove(); });

  if (w.fileURL) {
    if (w.fileType === 'video') {
      const v = document.createElement('video');
      v.src = w.fileURL;
      v.controls = true;
      v.controlsList = 'nodownload nofullscreen';
      v.disablePictureInPicture = true;
      v.autoplay = true;
      v.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;';
      v.oncontextmenu = () => false;
      overlay.style.display = 'none'; // let controls work
      media.insertBefore(v, overlay);
    } else {
      const img = document.createElement('img');
      img.src = w.fileURL;
      img.draggable = false;
      img.oncontextmenu = () => false;
      img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;';
      overlay.style.display = 'block';
      media.insertBefore(img, overlay);
    }
  } else {
    media.insertAdjacentHTML('afterbegin','<div style="color:var(--muted);font-size:0.82rem;text-align:center;"><div style="font-size:2rem;opacity:0.2;margin-bottom:0.5rem;">🎬</div>未上传媒体文件</div>');
    overlay.style.display = 'block';
  }

  document.getElementById('works-view').style.display = 'none';
  document.getElementById('player-view').style.display = 'flex';
  document.getElementById('player-view').style.flexDirection = 'column';
}

function closePlayer() {
  // stop any playing video
  const v = document.querySelector('#player-media video');
  if (v) { v.pause(); v.src = ''; }
  // remove media elements
  const media = document.getElementById('player-media');
  const overlay = document.getElementById('no-dl-overlay');
  Array.from(media.children).forEach(el => { if (el !== overlay) el.remove(); });
  overlay.style.display = 'none';

  document.getElementById('player-view').style.display = 'none';
  currentWorkId = null;

  if (currentCatId) {
    document.getElementById('works-view').style.display = 'flex';
    document.getElementById('works-view').style.flexDirection = 'column';
  } else {
    document.getElementById('welcome-view').style.display = 'flex';
  }
}

// prevent right-click on media
document.addEventListener('contextmenu', e => {
  if (e.target.tagName === 'VIDEO' || e.target.tagName === 'IMG') e.preventDefault();
});

// ══ INIT ══
renderProfile();
renderCats();
</script>
</body>
</html>
